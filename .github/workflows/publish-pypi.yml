name: Publish to PyPI

on:
  release:
    types:
      - published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CIBW_BUILD: "cp311-*"
  CIBW_SKIP: "*-musllinux_*"
  CIBW_BEFORE_ALL_LINUX: >-
    if command -v dnf >/dev/null 2>&1; then dnf install -y hdf5-devel;
    elif command -v yum >/dev/null 2>&1; then yum install -y hdf5-devel;
    else apt-get update && apt-get install -y libhdf5-dev; fi
  CIBW_BEFORE_BUILD_WINDOWS: "python -m pip install delvewheel"
  CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"

jobs:
  build-wheel-linux:
    name: Build release Linux wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-24.04
            arch: x86_64
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip twine

      - name: Build Linux wheel with cibuildwheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
        with:
          output-dir: dist

      - name: Check wheel metadata
        run: python -m twine check dist/*

      - name: Minimal wheel smoke test
        shell: bash
        run: |
          python -m venv .wheel-smoke
          .wheel-smoke/bin/python -m pip install --upgrade pip
          .wheel-smoke/bin/python -m pip install numpy
          .wheel-smoke/bin/python -m pip install --no-deps dist/*.whl
          .wheel-smoke/bin/python -c "import XpongeCPP, Xponge; print(XpongeCPP.__version__)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: dist/*.whl

  build-wheel-native:
    name: Build release native wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-intel
            runner: macos-15-intel
            arch: x86_64
          - label: macos-arm64
            runner: macos-15
            arch: arm64
          - label: windows-x64
            runner: windows-2025
            arch: AMD64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install macOS native dependencies
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          brew install hdf5
          echo "CMAKE_PREFIX_PATH=$(brew --prefix hdf5)" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=15.0" >> "$GITHUB_ENV"

      - name: Install Windows native dependencies
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "hdf5[core,zlib]:x64-windows"
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT -replace '\\', '/'
          "CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=$vcpkgRoot/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install wheel tools
        run: python -m pip install --upgrade pip twine

      - name: Build native wheel with cibuildwheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
        with:
          output-dir: dist

      - name: Check wheel metadata
        run: python -m twine check dist/*

      - name: Minimal wheel smoke test
        shell: bash
        run: |
          python -m venv .wheel-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            PY=.wheel-smoke/Scripts/python.exe
          else
            PY=.wheel-smoke/bin/python
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install numpy
          "$PY" -m pip install --no-deps dist/*.whl
          "$PY" -c "import XpongeCPP, Xponge; print(XpongeCPP.__version__)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: dist/*.whl

  build-sdist:
    name: Build release sdist
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist
        run: python -m build --sdist

      - name: Check sdist metadata
        run: python -m twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish release to PyPI
    needs:
      - build-wheel-linux
      - build-wheel-native
      - build-sdist
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show collected artifacts
        shell: bash
        run: ls -lah dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
